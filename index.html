<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog</title>
    <style>
        body {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #780c0c;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 5px 20px;
            text-align: center;
        }
        .product-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }
        .product-card {
            background-color: rgb(19, 151, 15);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 200px;
            padding: 20px;
            text-align: center;
        }
        .product-card img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .product-card h3 {
            margin-top: 10px;
            color: #333;
        }
        .product-card p {
            font-size: 14px;
            color: #666;
        }
        .product-card .price {
            font-size: 18px;
            color: #28a745;
            font-weight: bold;
        }
    </style>
    
</head>
<body>
    <div class="header">
        <h1>Welcome to Our Product Catalog</h1>
        <p>Browse through our amazing products!</p>
    </div>

    <div class="product-list" id="product-list">
        <!-- Product Cards will be injected here by JavaScript -->
    </div>
