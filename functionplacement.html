<!DOCTYPE html>
<html>
<head>
<title>Function Declaration Example</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
    padding:40px;
}

.box{
    background:white;
    width:500px;
    margin:auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 20px;
    margin:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#output{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="box">

<h2>JavaScript Function Example</h2>

<button onclick="runProgram()">Run Program</button>

<div id="output"></div>

</div>

<script>

// --- helper functions ---

function createElement() {
    return "New Element Created";
}

function setHandler(elem) {
    return elem + " and Handler Set";
}

function walkAround() {
    return "Walking Around";
}

// --- code which uses the functions ---

function runProgram(){

    let elem = createElement();

    let handler = setHandler(elem);

    let walking = walkAround();

    document.getElementById("output").innerHTML =
        elem + "<br>" +
        handler + "<br>" +
        walking;
}

</script>

</body>
</html>
